name: Cloudflare Pages End-To-End

on:
  deployment_status:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.deployment.id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: End-To-End Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: >-
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment_status.environment_url || github.event.deployment_status.target_url, '.pages.dev')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
        run: pnpm test:e2e
